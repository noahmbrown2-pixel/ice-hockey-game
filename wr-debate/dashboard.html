<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WR GOAT Debate Simulator</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3345;
    --text: #e4e6f0;
    --text-dim: #8b8fa3;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.3);
    --gold: #f1c40f;
    --silver: #bdc3c7;
    --bronze: #e67e22;
    --green: #00b894;
    --red: #e74c3c;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

  /* ── Hero ── */
  .hero {
    text-align: center;
    padding: 80px 24px 60px;
    background: linear-gradient(180deg, rgba(108,92,231,0.15) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
  }
  .hero-label {
    text-transform: uppercase;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 12px;
  }
  .hero h1 {
    font-size: clamp(2.5rem, 6vw, 4rem);
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(135deg, var(--gold), #f39c12);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero .subtitle {
    font-size: 1.2rem;
    color: var(--text-dim);
    max-width: 700px;
    margin: 16px auto 0;
  }
  .crown { font-size: 4rem; margin-bottom: 16px; display: block; }

  /* ── Nav tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
    justify-content: center;
    flex-wrap: wrap;
  }
  .tab {
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active {
    color: var(--accent);
    background: var(--surface);
    border-color: var(--accent);
  }

  .panel { display: none; padding: 32px 0; }
  .panel.active { display: block; }

  /* ── Rankings ── */
  .ranking-card {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .ranking-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  }
  .rank-badge {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 800;
    font-size: 1.2rem;
    background: var(--surface2);
    color: var(--text-dim);
  }
  .rank-1 .rank-badge { background: linear-gradient(135deg, #f1c40f, #f39c12); color: #000; box-shadow: 0 0 20px rgba(241,196,15,0.4); }
  .rank-2 .rank-badge { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #000; }
  .rank-3 .rank-badge { background: linear-gradient(135deg, #e67e22, #d35400); color: #fff; }
  .rank-info { flex: 1; }
  .rank-info h3 { font-size: 1.25rem; margin-bottom: 6px; }
  .rank-info p { color: var(--text-dim); font-size: 0.95rem; }

  /* ── Argument cards ── */
  .arg-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .arg-header {
    padding: 18px 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-weight: 600;
    font-size: 1.05rem;
    user-select: none;
    transition: background 0.15s;
  }
  .arg-header:hover { background: var(--surface2); }
  .arg-chevron {
    transition: transform 0.2s;
    color: var(--text-dim);
    font-size: 1.2rem;
  }
  .arg-card.open .arg-chevron { transform: rotate(180deg); }
  .arg-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.35s ease;
  }
  .arg-card.open .arg-body { max-height: 3000px; }
  .arg-content {
    padding: 0 24px 24px;
    color: var(--text-dim);
    white-space: pre-wrap;
    font-size: 0.95rem;
    line-height: 1.7;
  }

  /* ── Rebuttal thread ── */
  .rebuttal-group { margin-bottom: 32px; }
  .rebuttal-group h3 {
    font-size: 1.1rem;
    margin-bottom: 12px;
    color: var(--accent);
  }
  .rebuttal-entry {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin-bottom: 8px;
  }
  .rebuttal-entry .round-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .rebuttal-entry .rebuttal-text {
    white-space: pre-wrap;
    color: var(--text-dim);
    font-size: 0.93rem;
    line-height: 1.7;
  }

  /* ── Timeline ── */
  .timeline { position: relative; padding-left: 40px; }
  .timeline::before {
    content: '';
    position: absolute;
    left: 15px;
    top: 0;
    bottom: 0;
    width: 2px;
    background: var(--border);
  }
  .timeline-item {
    position: relative;
    margin-bottom: 32px;
  }
  .timeline-dot {
    position: absolute;
    left: -33px;
    top: 4px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--bg);
    box-shadow: 0 0 0 2px var(--accent);
  }
  .timeline-item.phase-end .timeline-dot { background: var(--green); box-shadow: 0 0 0 2px var(--green); }
  .timeline-phase {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: var(--accent);
    margin-bottom: 4px;
    font-weight: 600;
  }
  .timeline-title { font-weight: 600; margin-bottom: 4px; }
  .timeline-desc { color: var(--text-dim); font-size: 0.9rem; }

  /* ── Declaration box ── */
  .declaration {
    background: linear-gradient(135deg, rgba(108,92,231,0.1), rgba(241,196,15,0.1));
    border: 1px solid var(--accent);
    border-radius: 16px;
    padding: 32px;
    text-align: center;
    margin: 32px 0;
  }
  .declaration h3 {
    color: var(--gold);
    font-size: 1.3rem;
    margin-bottom: 12px;
  }
  .declaration p {
    color: var(--text-dim);
    max-width: 800px;
    margin: 0 auto;
    font-size: 1rem;
    line-height: 1.7;
  }

  /* ── Summary ── */
  .summary-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-top: 20px;
    color: var(--text-dim);
    line-height: 1.8;
    white-space: pre-wrap;
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 40px 24px;
    color: var(--text-dim);
    font-size: 0.85rem;
    border-top: 1px solid var(--border);
    margin-top: 60px;
  }
</style>
</head>
<body>

    {

      "argument": "Let's settle this once and for all: Randy Moss is the greatest wide receiver to ever lace them up. Forget the debates, look at the facts. We're talking about a player whose name became a verb – \"Mossed\" – synonymous with physically dominating defensive backs.\n\nWhile Jerry Rice has longevity records, Moss had peak dominance unlike anything we've ever seen. He walked into the league as a rookie in 1998 and instantly transformed the Minnesota Vikings into an offensive juggernaut, hauling in 17 touchdowns. Then, in 2007, he shattered the single-season touchdown record with 23 – *23!* – while paired with Tom Brady in New England. That record still stands, a testament to his unparalleled ability to stretch the field and win contested catches.\n\nBeyond the numbers, it's the *way* he played. His combination of size, speed, and incredible leaping ability was simply unmatched. Defenses had to completely alter their schemes to even attempt to contain him, often resorting to double and triple coverage, which, frankly, rarely worked. He struck fear into the hearts of opposing secondaries.\n\nRice was great, no doubt. But Moss possessed a raw, undeniable talent that redefined the position. He wasn't just catching passes; he was *imposing his will*. He forced defenses to play scared, and that, more than any statistic, is the mark of a true GOAT.\n"
    },
    {

      "argument": "Forget Rice. Forget Moss. Calvin Johnson, \"Megatron,\" is the undisputed GOAT. You cannot judge him by career totals alone because his career was tragically cut short. But in his prime, no receiver was more dominant, more physically imposing, or more unstoppable.\n\nLet's start with the obvious: He holds the single-season receiving record – 1,964 yards in 2012. That's not just a record; it's a testament to pure, unadulterated dominance. He achieved this while facing constant double and triple coverage on a team that often struggled offensively.\n\nBeyond the stats, consider the *how*. Johnson was 6'5\", 240 pounds, and ran a 4.35 40-yard dash. He was a physical freak capable of out-jumping, out-muscling, and out-running any defender. His catch radius was absurd; he could make contested catches look routine.\n\nHis impact transcended the box score. Defenses had to game-plan around him. He drew constant attention, opening opportunities for his teammates. His presence alone elevated the entire Detroit Lions offense.\n\nPeople will point to his lack of playoff success. But that's a team indictment, not an individual one. He dragged mediocre Lions teams to respectability. He retired early, at 30, because of the toll the game took on his body – a testament to the punishment he absorbed every single snap.\n\nCalvin Johnson's peak was higher than any other receiver in NFL history. He redefined the position. He was a force of nature, a walking mismatch. He wasn't just great; he was transformative. He is, without a doubt, the GOAT.\n"

      "argument": "Ladies and gentlemen, the debate ends here. The greatest wide receiver of all time is, without a shadow of a doubt, Terrell Owens. While others boast about Super Bowl rings and highlight-reel catches, T.O. delivered raw, unparalleled dominance, fueled by an unmatched passion that redefined the wide receiver position.\n\nLet's talk numbers. Upon retirement, Owens stood third all-time in receiving touchdowns with 153 – a testament to his undeniable nose for the endzone and his imposing physical presence. He ranks high in all-time receiving yards, proving his consistent ability to stretch the field and terrorize defenses. But it's more than just stats; it's *how* he achieved them.\n\nOwens played in an era defined by physical cornerbacks and smash-mouth football, facing double teams and constant harassment. Yet, he thrived. He was the prototype for the modern, physically imposing receiver, a force of nature who demanded the ball and consistently delivered.\n\nHe wasn't just a receiver; he was a game-changer, an iconoclast who elevated the intensity and entertainment value of the sport. His impact transcended statistics. He possessed an unquantifiable swagger, a relentless drive, and an unrivaled work ethic. Say what you will about his personality, but his dedication to his craft was undeniable.\n\nWhile others may have had shorter peaks of glory, Terrell Owens' sustained excellence, combined with his sheer physical dominance and undeniable impact on the game, cements his place as the undisputed GOAT. He revolutionized the position, and his legacy continues to inspire today's generation of wide receivers. The numbers speak for themselves, and the legend of T.O. lives on.\n"

    {

    {
      "player": "Calvin Johnson",
      "round": 1,

    },
    {

    <h2 style="margin-bottom: 24px;">Rebuttal Rounds</h2>
    <div id="rebuttals-list"></div>
  </div>

  <!-- Timeline Panel -->
  <div class="panel" id="panel-timeline">
    <div class="timeline" id="timeline"></div>
  </div>
</div>

<footer>
  WR GOAT Debate Simulator &mdash; Powered by Gemini AI Multi-Agent System
</footer>

<script>
(function() {
  const { openingArgs, rebuttalRound1, rebuttalRound2, judgeResult } = DATA;

  // ── Hero ──
  const winner = judgeResult.rankings[0];
  document.getElementById('hero-name').textContent = winner.player;
  document.getElementById('hero-declaration').textContent = judgeResult.goat_declaration;

  // ── Tabs ──
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    });
  });

  // ── Rankings ──
  const rankingsEl = document.getElementById('rankings-list');
  judgeResult.rankings.forEach(r => {
    const card = document.createElement('div');
    card.className = 'ranking-card rank-' + r.rank;
    card.innerHTML =
      '<div class="rank-badge">' + r.rank + '</div>' +
      '<div class="rank-info"><h3>' + escHtml(r.player) + '</h3><p>' + escHtml(r.reasoning) + '</p></div>';
    rankingsEl.appendChild(card);
  });

  // Declaration & summary
  const declBox = document.getElementById('declaration-box');
  declBox.innerHTML = '<h3>GOAT Declaration</h3><p>' + escHtml(judgeResult.goat_declaration) + '</p>';
  document.getElementById('summary-box').textContent = judgeResult.debate_summary;

  // ── Opening Arguments ──
  const openingEl = document.getElementById('opening-list');
  openingArgs.forEach(a => {
    const card = document.createElement('div');
    card.className = 'arg-card';
    card.innerHTML =
      '<div class="arg-header"><span>' + escHtml(a.player) + '</span><span class="arg-chevron">&#x25BC;</span></div>' +
      '<div class="arg-body"><div class="arg-content">' + escHtml(a.argument) + '</div></div>';
    card.querySelector('.arg-header').addEventListener('click', () => card.classList.toggle('open'));
    openingEl.appendChild(card);
  });

  // ── Rebuttals ──
  const rebuttalsEl = document.getElementById('rebuttals-list');
  const players = [...new Set(rebuttalRound1.map(r => r.player))];
  players.forEach(player => {
    const group = document.createElement('div');
    group.className = 'rebuttal-group';

    const r1 = rebuttalRound1.find(r => r.player === player);
    const r2 = rebuttalRound2.find(r => r.player === player);

    let inner = '<h3>' + escHtml(player) + '</h3>';
    if (r1) {
      inner += '<div class="rebuttal-entry"><div class="round-label">Round 1 Rebuttal</div><div class="rebuttal-text">' + escHtml(r1.rebuttal) + '</div></div>';
    }
    if (r2) {
      inner += '<div class="rebuttal-entry"><div class="round-label">Round 2 Rebuttal</div><div class="rebuttal-text">' + escHtml(r2.rebuttal) + '</div></div>';
    }
    group.innerHTML = inner;
    rebuttalsEl.appendChild(group);
  });

  // ── Timeline ──
  const timelineEl = document.getElementById('timeline');
  const items = [];

  items.push({ phase: 'Phase 1', title: 'Opening Arguments Begin', desc: '10 AI agents each advocate for their assigned wide receiver.', end: false });
  openingArgs.forEach(a => {
    items.push({ phase: 'Phase 1', title: a.player + ' presents opening argument', desc: a.argument.slice(0, 120) + '...', end: false });
  });
  items.push({ phase: 'Phase 1', title: 'Opening Arguments Complete', desc: 'All 10 agents have presented their cases.', end: true });

  items.push({ phase: 'Phase 2', title: 'Rebuttal Round 1 Begins', desc: 'Agents respond to competing arguments.', end: false });
  items.push({ phase: 'Phase 2', title: 'Rebuttal Round 1 Complete', desc: 'All agents delivered first rebuttals.', end: true });
  items.push({ phase: 'Phase 2', title: 'Rebuttal Round 2 Begins', desc: 'Final round of counterarguments.', end: false });
  items.push({ phase: 'Phase 2', title: 'Rebuttal Round 2 Complete', desc: 'All rebuttals delivered.', end: true });

  items.push({ phase: 'Phase 3', title: 'Judge Evaluation', desc: 'Impartial judge reviews all arguments and rebuttals.', end: false });
  items.push({ phase: 'Phase 3', title: winner.player + ' declared GOAT', desc: judgeResult.goat_declaration.slice(0, 150) + '...', end: true });

  items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'timeline-item' + (item.end ? ' phase-end' : '');
    el.innerHTML =
      '<div class="timeline-dot"></div>' +
      '<div class="timeline-phase">' + escHtml(item.phase) + '</div>' +
      '<div class="timeline-title">' + escHtml(item.title) + '</div>' +
      '<div class="timeline-desc">' + escHtml(item.desc) + '</div>';
    timelineEl.appendChild(el);
  });

  function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
})();
</script>
</body>
</html>
