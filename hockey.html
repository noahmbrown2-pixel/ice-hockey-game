<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ice Hockey</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; overflow: hidden; }
  canvas { border-radius: 12px; box-shadow: 0 0 40px rgba(0,150,255,0.3); }
  #ui { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); text-align: center; color: #fff; }
  #score { font-size: 48px; font-weight: bold; letter-spacing: 8px; text-shadow: 0 0 20px rgba(0,150,255,0.5); }
  #score .red { color: #ff4444; }
  #score .blue { color: #44aaff; }
  #info { font-size: 14px; color: #888; margin-top: 6px; }
  #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; flex-direction: column; background: rgba(0,0,0,0.7); z-index: 10; }
  #overlay h1 { color: #fff; font-size: 52px; margin-bottom: 10px; text-shadow: 0 0 30px rgba(0,150,255,0.6); }
  #overlay p { color: #aaa; font-size: 18px; margin-bottom: 30px; }
  #overlay button { padding: 14px 40px; font-size: 20px; background: #44aaff; color: #fff; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
  #overlay button:hover { background: #2288dd; }
  #goal-flash { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 80px; font-weight: bold; color: #fff; text-shadow: 0 0 40px gold; display: none; z-index: 5; pointer-events: none; }
</style>
</head>
<body>
<div id="ui">
  <div id="score"><span class="red" id="s1">0</span> &mdash; <span class="blue" id="s2">0</span></div>
  <div id="info">WASD to move &bull; SPACE to boost &bull; First to 7 wins</div>
</div>
<canvas id="c"></canvas>
<div id="goal-flash">GOAL!</div>
<div id="overlay">
  <h1>Ice Hockey</h1>
  <p>You (red) vs CPU (blue) &mdash; First to 7 wins!</p>
  <button id="startBtn">Play</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 900, H = 560;
canvas.width = W; canvas.height = H;

const GOAL_W = 12, GOAL_H = 130;
const PUCK_R = 10, PLAYER_R = 22;
const FRICTION = 0.985, PUCK_FRICTION = 0.993;
const MAX_SPEED = 5.5, BOOST_SPEED = 8;
const WIN_SCORE = 7;

let keys = {};
let score = [0, 0];
let gameRunning = false;
let goalCooldown = 0;
let particles = [];
let trailParticles = [];
let period = 1;

const player = { x: 200, y: H/2, vx: 0, vy: 0, r: PLAYER_R, boosting: false, boostFuel: 100 };
const cpu    = { x: W-200, y: H/2, vx: 0, vy: 0, r: PLAYER_R };
const puck   = { x: W/2, y: H/2, vx: 0, vy: 0, r: PUCK_R };

document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  score = [0, 0]; period = 1;
  updateScoreDisplay();
  resetPositions();
  gameRunning = true;
  requestAnimationFrame(loop);
}

function resetPositions() {
  player.x = 200; player.y = H/2; player.vx = 0; player.vy = 0;
  cpu.x = W-200; cpu.y = H/2; cpu.vx = 0; cpu.vy = 0;
  puck.x = W/2; puck.y = H/2; puck.vx = 0; puck.vy = 0;
  goalCooldown = 60;
}

function updateScoreDisplay() {
  document.getElementById('s1').textContent = score[0];
  document.getElementById('s2').textContent = score[1];
}

function showGoal() {
  const el = document.getElementById('goal-flash');
  el.style.display = 'block';
  el.style.opacity = 1;
  let fade = setInterval(() => {
    el.style.opacity = parseFloat(el.style.opacity) - 0.02;
    if (parseFloat(el.style.opacity) <= 0) { el.style.display = 'none'; clearInterval(fade); }
  }, 30);
}

function spawnGoalParticles(x, y) {
  for (let i = 0; i < 40; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 2 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed, life: 60 + Math.random()*30, color: `hsl(${Math.random()*60+20}, 100%, ${50+Math.random()*30}%)` });
  }
}

function dist(a, b) { return Math.hypot(a.x-b.x, a.y-b.y); }

function circleCollide(a, b) {
  const d = dist(a, b);
  if (d < a.r + b.r) {
    const nx = (b.x - a.x) / d;
    const ny = (b.y - a.y) / d;
    const overlap = (a.r + b.r) - d;
    a.x -= nx * overlap * 0.5;
    a.y -= ny * overlap * 0.5;
    b.x += nx * overlap * 0.5;
    b.y += ny * overlap * 0.5;
    const dvx = a.vx - b.vx;
    const dvy = a.vy - b.vy;
    const dot = dvx * nx + dvy * ny;
    if (dot > 0) {
      a.vx -= dot * nx * 0.8;
      a.vy -= dot * ny * 0.8;
      b.vx += dot * nx * 1.2;
      b.vy += dot * ny * 1.2;
    }
    return true;
  }
  return false;
}

function updatePlayer() {
  let ax = 0, ay = 0;
  if (keys['KeyW'] || keys['ArrowUp']) ay = -1;
  if (keys['KeyS'] || keys['ArrowDown']) ay = 1;
  if (keys['KeyA'] || keys['ArrowLeft']) ax = -1;
  if (keys['KeyD'] || keys['ArrowRight']) ax = 1;

  player.boosting = keys['Space'] && player.boostFuel > 0;
  const accel = player.boosting ? 0.7 : 0.4;
  const maxSpd = player.boosting ? BOOST_SPEED : MAX_SPEED;

  if (player.boosting) player.boostFuel = Math.max(0, player.boostFuel - 1);
  else player.boostFuel = Math.min(100, player.boostFuel + 0.3);

  player.vx += ax * accel;
  player.vy += ay * accel;
  const spd = Math.hypot(player.vx, player.vy);
  if (spd > maxSpd) { player.vx *= maxSpd/spd; player.vy *= maxSpd/spd; }
  player.vx *= FRICTION; player.vy *= FRICTION;
  player.x += player.vx; player.y += player.vy;

  // trail
  if (spd > 2) {
    trailParticles.push({ x: player.x, y: player.y, life: 15, color: 'rgba(255,80,80,' });
  }
}

function updateCPU() {
  let targetX, targetY;
  const puckDist = dist(cpu, puck);

  if (puck.x > W * 0.4) {
    // go for the puck
    const aimX = puck.x + puck.vx * 10;
    const aimY = puck.y + puck.vy * 10;
    targetX = aimX; targetY = aimY;
  } else {
    // defend goal
    targetX = W - 120;
    targetY = puck.y * 0.6 + H/2 * 0.4;
  }

  // if puck is heading toward our goal, intercept
  if (puck.vx > 1) {
    const timeToGoal = (W - GOAL_W - puck.x) / puck.vx;
    const interceptY = puck.y + puck.vy * timeToGoal;
    if (timeToGoal > 0 && timeToGoal < 60) {
      targetX = W - 100;
      targetY = interceptY;
    }
  }

  const dx = targetX - cpu.x;
  const dy = targetY - cpu.y;
  const d = Math.hypot(dx, dy);
  const cpuAccel = 0.32;
  const cpuMax = 4.5;

  if (d > 5) {
    cpu.vx += (dx/d) * cpuAccel;
    cpu.vy += (dy/d) * cpuAccel;
  }

  const spd = Math.hypot(cpu.vx, cpu.vy);
  if (spd > cpuMax) { cpu.vx *= cpuMax/spd; cpu.vy *= cpuMax/spd; }
  cpu.vx *= FRICTION; cpu.vy *= FRICTION;
  cpu.x += cpu.vx; cpu.y += cpu.vy;

  if (spd > 2) {
    trailParticles.push({ x: cpu.x, y: cpu.y, life: 15, color: 'rgba(80,150,255,' });
  }
}

function updatePuck() {
  puck.vx *= PUCK_FRICTION; puck.vy *= PUCK_FRICTION;
  puck.x += puck.vx; puck.y += puck.vy;

  // wall bounce top/bottom
  if (puck.y - puck.r < 0) { puck.y = puck.r; puck.vy *= -0.8; }
  if (puck.y + puck.r > H) { puck.y = H - puck.r; puck.vy *= -0.8; }

  // wall bounce left/right (except goal area)
  const goalTop = H/2 - GOAL_H/2;
  const goalBot = H/2 + GOAL_H/2;

  if (puck.x - puck.r < 0) {
    if (puck.y > goalTop && puck.y < goalBot) {
      // goal for CPU (right)
      if (goalCooldown <= 0) {
        score[1]++;
        updateScoreDisplay();
        showGoal();
        spawnGoalParticles(puck.x, puck.y);
        checkWin();
        resetPositions();
      }
    } else {
      puck.x = puck.r; puck.vx *= -0.8;
    }
  }
  if (puck.x + puck.r > W) {
    if (puck.y > goalTop && puck.y < goalBot) {
      // goal for Player (left)
      if (goalCooldown <= 0) {
        score[0]++;
        updateScoreDisplay();
        showGoal();
        spawnGoalParticles(puck.x, puck.y);
        checkWin();
        resetPositions();
      }
    } else {
      puck.x = W - puck.r; puck.vx *= -0.8;
    }
  }
}

function clampPlayers() {
  [player, cpu].forEach(p => {
    if (p.x - p.r < 0)  { p.x = p.r; p.vx *= -0.3; }
    if (p.x + p.r > W)  { p.x = W - p.r; p.vx *= -0.3; }
    if (p.y - p.r < 0)  { p.y = p.r; p.vy *= -0.3; }
    if (p.y + p.r > H)  { p.y = H - p.r; p.vy *= -0.3; }
  });
}

function checkWin() {
  if (score[0] >= WIN_SCORE || score[1] >= WIN_SCORE) {
    gameRunning = false;
    const overlay = document.getElementById('overlay');
    overlay.style.display = 'flex';
    overlay.querySelector('h1').textContent = score[0] >= WIN_SCORE ? 'You Win!' : 'CPU Wins!';
    overlay.querySelector('p').textContent = `Final Score: ${score[0]} - ${score[1]}`;
    overlay.querySelector('button').textContent = 'Play Again';
  }
}

function drawRink() {
  // ice
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#d8eef7');
  grad.addColorStop(0.5, '#e8f4fa');
  grad.addColorStop(1, '#d8eef7');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(0, 0, W, H, 20);
  ctx.fill();

  // boards
  ctx.strokeStyle = '#334';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.roundRect(2, 2, W-4, H-4, 20);
  ctx.stroke();

  // center line
  ctx.strokeStyle = 'rgba(200,0,0,0.4)';
  ctx.lineWidth = 3;
  ctx.setLineDash([10, 10]);
  ctx.beginPath(); ctx.moveTo(W/2, 0); ctx.lineTo(W/2, H); ctx.stroke();
  ctx.setLineDash([]);

  // center circle
  ctx.strokeStyle = 'rgba(200,0,0,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(W/2, H/2, 60, 0, Math.PI*2); ctx.stroke();

  // center dot
  ctx.fillStyle = 'rgba(200,0,0,0.5)';
  ctx.beginPath(); ctx.arc(W/2, H/2, 6, 0, Math.PI*2); ctx.fill();

  // blue lines
  ctx.strokeStyle = 'rgba(0,0,200,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(W*0.35, 0); ctx.lineTo(W*0.35, H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.65, 0); ctx.lineTo(W*0.65, H); ctx.stroke();

  // face-off circles
  const faceOffSpots = [[W*0.2, H*0.3],[W*0.2, H*0.7],[W*0.8, H*0.3],[W*0.8, H*0.7]];
  faceOffSpots.forEach(([fx,fy]) => {
    ctx.strokeStyle = 'rgba(200,0,0,0.2)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(fx, fy, 40, 0, Math.PI*2); ctx.stroke();
    ctx.fillStyle = 'rgba(200,0,0,0.4)';
    ctx.beginPath(); ctx.arc(fx, fy, 4, 0, Math.PI*2); ctx.fill();
  });

  // goals
  const goalTop = H/2 - GOAL_H/2;
  const goalBot = H/2 + GOAL_H/2;

  // left goal (CPU scores here = red's goal)
  ctx.fillStyle = 'rgba(255,50,50,0.15)';
  ctx.fillRect(0, goalTop, 20, GOAL_H);
  ctx.strokeStyle = '#cc3333';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, goalTop); ctx.lineTo(18, goalTop); ctx.lineTo(18, goalBot); ctx.lineTo(0, goalBot);
  ctx.stroke();

  // right goal
  ctx.fillStyle = 'rgba(50,100,255,0.15)';
  ctx.fillRect(W-20, goalTop, 20, GOAL_H);
  ctx.strokeStyle = '#3366cc';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(W, goalTop); ctx.lineTo(W-18, goalTop); ctx.lineTo(W-18, goalBot); ctx.lineTo(W, goalBot);
  ctx.stroke();

  // goal creases
  ctx.fillStyle = 'rgba(150,200,255,0.3)';
  ctx.beginPath(); ctx.arc(10, H/2, 45, -Math.PI/2, Math.PI/2); ctx.fill();
  ctx.beginPath(); ctx.arc(W-10, H/2, 45, Math.PI/2, -Math.PI/2); ctx.fill();
}

function drawPlayer(p, color, label) {
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath(); ctx.ellipse(p.x+2, p.y+4, p.r, p.r*0.5, 0, 0, Math.PI*2); ctx.fill();

  // body
  const g = ctx.createRadialGradient(p.x-4, p.y-4, 2, p.x, p.y, p.r);
  g.addColorStop(0, color === 'red' ? '#ff6666' : '#66bbff');
  g.addColorStop(1, color === 'red' ? '#cc2222' : '#2266cc');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = color === 'red' ? '#aa1111' : '#1144aa';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.stroke();

  // stick direction
  const stickAngle = Math.atan2(puck.y - p.y, puck.x - p.x);
  const stickLen = p.r + 12;
  ctx.strokeStyle = '#553311';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(p.x + Math.cos(stickAngle)*p.r*0.5, p.y + Math.sin(stickAngle)*p.r*0.5);
  ctx.lineTo(p.x + Math.cos(stickAngle)*stickLen, p.y + Math.sin(stickAngle)*stickLen);
  ctx.stroke();

  // label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px Segoe UI, Arial';
  ctx.textAlign = 'center';
  ctx.fillText(label, p.x, p.y + 4);

  // boost bar for player
  if (color === 'red') {
    const bw = 36, bh = 4;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fillRect(p.x - bw/2, p.y - p.r - 10, bw, bh);
    ctx.fillStyle = player.boostFuel > 30 ? '#44ff44' : '#ff4444';
    ctx.fillRect(p.x - bw/2, p.y - p.r - 10, bw * (player.boostFuel/100), bh);
  }
}

function drawPuck() {
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(puck.x+2, puck.y+3, puck.r, puck.r*0.5, 0, 0, Math.PI*2); ctx.fill();

  const g = ctx.createRadialGradient(puck.x-2, puck.y-2, 1, puck.x, puck.y, puck.r);
  g.addColorStop(0, '#444');
  g.addColorStop(1, '#111');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(puck.x, puck.y, puck.r, 0, Math.PI*2); ctx.stroke();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life / 90;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
  });
  trailParticles.forEach(p => {
    ctx.globalAlpha = p.life / 15 * 0.3;
    ctx.fillStyle = p.color + (p.life/15*0.4) + ')';
    ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function updateParticles() {
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--; });
  particles = particles.filter(p => p.life > 0);
  trailParticles.forEach(p => { p.life--; });
  trailParticles = trailParticles.filter(p => p.life > 0);
}

function loop() {
  if (!gameRunning) return;

  if (goalCooldown > 0) goalCooldown--;

  updatePlayer();
  updateCPU();
  circleCollide(player, puck);
  circleCollide(cpu, puck);
  circleCollide(player, cpu);
  updatePuck();
  clampPlayers();
  updateParticles();

  // draw
  ctx.clearRect(0, 0, W, H);
  drawRink();
  drawParticles();
  drawPuck();
  drawPlayer(player, 'red', 'YOU');
  drawPlayer(cpu, 'blue', 'CPU');

  // boost indicator on screen edge
  if (player.boosting) {
    ctx.strokeStyle = 'rgba(255,200,0,0.3)';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.roundRect(4, 4, W-8, H-8, 18); ctx.stroke();
  }

  requestAnimationFrame(loop);
}

// initial draw
ctx.clearRect(0, 0, W, H);
drawRink();
drawPlayer(player, 'red', 'YOU');
drawPlayer(cpu, 'blue', 'CPU');
drawPuck();
</script>
</body>
</html>
