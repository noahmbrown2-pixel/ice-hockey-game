<!DOCTYPE html>
<html>
<head>
<title>2D Soccer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial, sans-serif; }
canvas { display: block; border: 2px solid #333; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 540;
const W = canvas.width, H = canvas.height;

// Field layout
const GROUND = H - 70;
const FL = 55;          // field left wall (right side of left goal post)
const FR = W - 55;      // field right wall
const GOAL_H = 130;
const GOAL_Y = GROUND - GOAL_H;
const GOAL_DEPTH = 50;
const GRAVITY = 0.55;
const FRICTION = 0.86;

// --- State ---
let score = [0, 0];
let gameTime = 90;
let gameOver = false;
let goalFlash = 0, goalSide = -1;
let resetTimer = 0;
let lastTime = 0;
let particles = [];

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
document.addEventListener('keyup',   e => { keys[e.code] = false; });

// --- Ball ---
const ball = { x: W/2, y: GROUND - 30, vx: 0, vy: -2, r: 13 };

// --- Players ---
function makePlayer(x, col, num, facing) {
  return { x, y: GROUND - 52, vx: 0, vy: 0, w: 26, h: 52,
           onGround: false, facing, color: col, num,
           kickCD: 0, kickAnim: 0 };
}
let P = makePlayer(W/2 - 130, '#42a5f5', '9', 1);
let AI = makePlayer(W/2 + 130, '#ef5350', '1', -1);

// --- AI brain ---
let aiThink = { state: 'chase', timer: 0 };

function resetPositions() {
  ball.x = W/2; ball.y = GROUND - 30; ball.vx = 0; ball.vy = -4;
  P.x = W/2 - 130; P.y = GROUND - 52; P.vx = 0; P.vy = 0;
  AI.x = W/2 + 130; AI.y = GROUND - 52; AI.vx = 0; AI.vy = 0;
}

function restart() {
  score = [0, 0]; gameTime = 90; gameOver = false;
  goalFlash = 0; resetTimer = 0; particles = [];
  resetPositions();
}
document.addEventListener('keydown', e => { if (e.code === 'KeyR') restart(); });

// --- Physics helpers ---
function applyGravity(o) { o.vy += GRAVITY; }

function groundCollide(o) {
  if (o.y + o.h >= GROUND) {
    o.y = GROUND - o.h;
    o.vy = 0;
    o.onGround = true;
    o.vx *= 0.82;
  } else { o.onGround = false; }
}

function clampX(o, minX, maxX) {
  if (o.x < minX) { o.x = minX; o.vx = Math.abs(o.vx) * 0.3; }
  if (o.x > maxX) { o.x = maxX; o.vx = -Math.abs(o.vx) * 0.3; }
}

// Push ball away from player body
function pushBall(p) {
  const cx = p.x, cy = p.y + p.h * 0.45;
  const dx = ball.x - cx, dy = ball.y - cy;
  const d = Math.hypot(dx, dy);
  const minD = ball.r + p.w * 0.6;
  if (d < minD && d > 0.1) {
    const nx = dx / d, ny = dy / d;
    ball.x = cx + nx * minD;
    ball.y = cy + ny * minD;
    const relVx = ball.vx - p.vx * 0.5;
    const relVy = ball.vy - p.vy * 0.3;
    const dot = relVx * nx + relVy * ny;
    if (dot < 0) {
      ball.vx -= dot * nx * 1.4;
      ball.vy -= dot * ny * 1.4;
    }
    // Small random spin
    ball.vx += (Math.random() - 0.5) * 0.4;
  }
}

function kick(p, isAI) {
  if (p.kickCD > 0) return;
  const dx = ball.x - p.x, dy = ball.y - (p.y + p.h * 0.4);
  if (Math.hypot(dx, dy) > 52) return;
  const spd = 16;
  if (isAI) {
    // Kick in the direction AI is facing, with big random spread (no aimbot)
    ball.vx = -spd * (0.5 + Math.random() * 0.5);
    ball.vy = -spd * (0.2 + Math.random() * 0.5);
  } else {
    ball.vx = p.facing * spd;
    ball.vy = (keys['ArrowUp'] || keys['KeyW']) ? -spd * 0.8 : -3.5;
  }
  ball.vx += (Math.random() - 0.5) * 5;
  ball.vy += (Math.random() - 0.5) * 4;
  p.kickCD = 8;
  p.kickAnim = 12;
  spawnKickParticles(ball.x, ball.y);
}

function spawnKickParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    const a = Math.random() * Math.PI * 2;
    particles.push({
      x, y, vx: Math.cos(a) * (2 + Math.random() * 4),
      vy: Math.sin(a) * (2 + Math.random() * 4),
      life: 1, color: `hsl(${40 + Math.random()*40},100%,70%)`
    });
  }
}

// --- Update player (human) ---
function updatePlayer(dt) {
  if (resetTimer > 0) return;
  const spd = 5;
  if (keys['ArrowLeft'] || keys['KeyA']) { P.vx = -spd; P.facing = -1; }
  else if (keys['ArrowRight'] || keys['KeyD']) { P.vx = spd; P.facing = 1; }
  else P.vx *= 0.75;

  if ((keys['ArrowUp'] || keys['KeyW'] || keys['Space']) && P.onGround) {
    P.vy = -11.5; P.onGround = false;
  }
  if (keys['KeyX'] || keys['KeyZ'] || keys['ShiftLeft'] || keys['ShiftRight']) kick(P, false);
  if (P.kickCD > 0) P.kickCD--;
  if (P.kickAnim > 0) P.kickAnim--;

  applyGravity(P);
  P.x += P.vx; P.y += P.vy;
  groundCollide(P);
  clampX(P, FL + 2, FR - 2);
  // Ceiling
  if (P.y < 40) { P.y = 40; P.vy = Math.abs(P.vy); }
}

// --- Update AI ---
function updateAI(dt) {
  if (resetTimer > 0) return;

  const bDist = Math.hypot(ball.x - AI.x, ball.y - (AI.y + AI.h * 0.45));
  const aSpd = 4.5;

  // Target: get behind the ball relative to the left goal (AI attacks left)
  // If ball is to AI's right, approach from the right; otherwise get to ball
  let targetX;
  if (ball.x < FR - 60) {
    // Chase the ball, positioning slightly to the right of it to kick left
    targetX = ball.x + 20;
  } else {
    // Ball is near AI's own goal — defend
    targetX = FR - 70;
  }

  const xDiff = targetX - AI.x;
  AI.vx = Math.sign(xDiff) * Math.min(aSpd, Math.abs(xDiff) * 0.15 + 1.5);
  AI.facing = Math.sign(xDiff) || AI.facing;

  // Jump: ball is high and nearby, or ball is bouncing upward near AI
  const ballHigh = ball.y < AI.y - 30 && Math.abs(ball.x - AI.x) < 120;
  const ballBouncing = ball.vy < -3 && bDist < 100;
  if ((ballHigh || ballBouncing) && AI.onGround) {
    AI.vy = -12;
    AI.onGround = false;
  }

  // Kick when close enough
  if (bDist < 55) kick(AI, true);
  if (AI.kickCD > 0) AI.kickCD--;
  if (AI.kickAnim > 0) AI.kickAnim--;

  applyGravity(AI);
  AI.x += AI.vx; AI.y += AI.vy;
  groundCollide(AI);
  clampX(AI, FL + 2, FR - 2);
  if (AI.y < 40) { AI.y = 40; AI.vy = Math.abs(AI.vy); }
}

// --- Update ball ---
function updateBall() {
  if (resetTimer > 0) return;

  applyGravity(ball);
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Ground
  if (ball.y + ball.r >= GROUND) {
    ball.y = GROUND - ball.r;
    ball.vy *= -0.55;
    ball.vx *= FRICTION;
    if (Math.abs(ball.vy) < 0.8) ball.vy = 0;
  }
  // Ceiling
  if (ball.y - ball.r <= 40) {
    ball.y = 40 + ball.r;
    ball.vy = Math.abs(ball.vy) * 0.55;
  }

  // Left wall / left goal
  if (ball.x - ball.r <= FL) {
    if (ball.y > GOAL_Y && ball.y < GROUND) {
      // Ball entered left goal — AI (red) scores
      score[1]++;
      goalSide = 1; goalFlash = 150;
      resetTimer = 140;
      spawnGoalParticles(FL, '#ef5350');
      resetPositions();
    } else {
      ball.x = FL + ball.r;
      ball.vx = Math.abs(ball.vx) * 0.6;
    }
  }
  // Right wall / right goal
  if (ball.x + ball.r >= FR) {
    if (ball.y > GOAL_Y && ball.y < GROUND) {
      // Ball entered right goal — Player (blue) scores
      score[0]++;
      goalSide = 0; goalFlash = 150;
      resetTimer = 140;
      spawnGoalParticles(FR, '#42a5f5');
      resetPositions();
    } else {
      ball.x = FR - ball.r;
      ball.vx = -Math.abs(ball.vx) * 0.6;
    }
  }

  pushBall(P);
  pushBall(AI);

  // Air resistance
  ball.vx *= 0.993;
  ball.vy *= 0.993;
}

function spawnGoalParticles(gx, col) {
  for (let i = 0; i < 40; i++) {
    particles.push({
      x: gx, y: GOAL_Y + Math.random() * GOAL_H,
      vx: (Math.random() - 0.5) * 12,
      vy: (Math.random() - 0.5) * 10 - 3,
      life: 1, color: col
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.2;
    p.life -= dt * 1.5;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// --- Drawing ---
function drawField() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, GROUND);
  sky.addColorStop(0, '#0d47a1');
  sky.addColorStop(1, '#1976d2');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, GROUND);

  // Crowd stands (simple)
  ctx.fillStyle = '#0a3580';
  ctx.fillRect(0, 0, W, 38);
  for (let i = 0; i < W; i += 14) {
    ctx.fillStyle = ['#c62828','#1565c0','#f9a825','#2e7d32','#6a1b9a'][Math.floor(i/14) % 5];
    ctx.fillRect(i, 6 + Math.sin(i * 0.3) * 6, 10, 20);
  }

  // Grass stripes
  for (let i = 0; i < 11; i++) {
    const sw = (FR - FL) / 11;
    ctx.fillStyle = i % 2 === 0 ? '#2e7d32' : '#388e3c';
    ctx.fillRect(FL + i * sw, GROUND, sw, H - GROUND);
  }
  // Outside grass (behind goals)
  ctx.fillStyle = '#1b5e20';
  ctx.fillRect(0, GROUND, FL, H - GROUND);
  ctx.fillRect(FR, GROUND, W - FR, H - GROUND);

  // Ground line
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(FL, GROUND); ctx.lineTo(FR, GROUND); ctx.stroke();

  // Center line
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 2;
  ctx.setLineDash([12, 10]);
  ctx.beginPath(); ctx.moveTo(W/2, 42); ctx.lineTo(W/2, GROUND); ctx.stroke();
  ctx.setLineDash([]);

  // Center circle
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(W/2, GROUND, 65, -Math.PI, 0);
  ctx.stroke();
  ctx.beginPath(); ctx.arc(W/2, GROUND, 3, 0, Math.PI*2); ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fill();

  // Penalty areas
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 2;
  const pW = 95, pOff = 28;
  ctx.strokeRect(FL, GOAL_Y - pOff, pW, GOAL_H + pOff);
  ctx.strokeRect(FR - pW, GOAL_Y - pOff, pW, GOAL_H + pOff);

  // === Goals ===
  drawGoal(true);
  drawGoal(false);
}

function drawGoal(isLeft) {
  const gx = isLeft ? FL - GOAL_DEPTH : FR;
  const col = isLeft ? '#ef5350' : '#42a5f5';
  const postW = 8;

  // Net
  ctx.fillStyle = `rgba(${isLeft?'239,83,80':'79,195,247'},0.08)`;
  ctx.fillRect(gx, GOAL_Y, GOAL_DEPTH, GOAL_H);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  for (let y = GOAL_Y + 16; y < GROUND; y += 16) {
    ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + GOAL_DEPTH, y); ctx.stroke();
  }
  for (let x = gx + 12; x < gx + GOAL_DEPTH; x += 12) {
    ctx.beginPath(); ctx.moveTo(x, GOAL_Y); ctx.lineTo(x, GROUND); ctx.stroke();
  }

  // Back post
  ctx.fillStyle = '#bdbdbd';
  ctx.fillRect(gx, GOAL_Y, postW, GOAL_H);

  // Crossbar
  const cpX = isLeft ? FL - GOAL_DEPTH : FR - postW;
  ctx.fillStyle = '#fff';
  ctx.fillRect(cpX, GOAL_Y, GOAL_DEPTH + postW, postW);

  // Front post (at FL or FR)
  ctx.fillStyle = '#fff';
  const fpX = isLeft ? FL - postW : FR;
  ctx.fillRect(fpX, GOAL_Y, postW, GOAL_H);

  // Team color stripe on post
  ctx.fillStyle = col;
  ctx.fillRect(fpX + 1, GOAL_Y + 1, postW - 2, postW - 2);
}

function drawPlayerChar(p, isP) {
  ctx.save();
  ctx.translate(p.x, p.y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(0, p.h + 3, 15, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Legs
  const walkSpeed = Math.abs(p.vx);
  const legOsc = p.onGround ? Math.sin(Date.now() * 0.014 * (walkSpeed + 1)) * (walkSpeed * 0.7 + 1) : 0;
  const kickLeg = p.kickAnim > 0 ? p.facing * 14 * (p.kickAnim / 12) : 0;

  ctx.fillStyle = '#ffcc80'; // skin (calves)
  // Left leg
  ctx.save();
  ctx.translate(-7, 40);
  ctx.rotate((legOsc * 0.06) + (p.facing < 0 ? kickLeg * 0.05 : 0));
  ctx.fillRect(-5, 0, 10, 15);
  ctx.fillStyle = '#fff'; ctx.fillRect(-5, 13, 10, 5);      // sock
  ctx.fillStyle = '#222'; ctx.fillRect(-6, 17, 12, 4);     // cleat
  ctx.restore();
  // Right leg
  ctx.save();
  ctx.translate(7, 40);
  ctx.rotate((-legOsc * 0.06) + (p.facing > 0 ? kickLeg * 0.05 : 0));
  ctx.fillRect(-5, 0, 10, 15);
  ctx.fillStyle = '#fff'; ctx.fillRect(-5, 13, 10, 5);
  ctx.fillStyle = '#222'; ctx.fillRect(-6, 17, 12, 4);
  ctx.restore();

  // Shorts
  ctx.fillStyle = isP ? '#1a237e' : '#b71c1c';
  ctx.fillRect(-13, 36, 26, 13);

  // Jersey body
  ctx.fillStyle = p.color;
  ctx.fillRect(-13, 14, 26, 24);

  // Jersey stripes
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fillRect(-4, 14, 8, 24);

  // Arms
  ctx.fillStyle = p.color;
  ctx.fillRect(-19, 16, 8, 18);
  ctx.fillRect(11, 16, 8, 18);
  ctx.fillStyle = '#ffcc80';
  ctx.fillRect(-19, 33, 8, 5);
  ctx.fillRect(11, 33, 8, 5);

  // Head
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath(); ctx.arc(0, 6, 11, 0, Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle = isP ? '#4e342e' : '#1a1a1a';
  ctx.beginPath(); ctx.arc(0, 2, 11, Math.PI, 0); ctx.fill();
  ctx.fillRect(-11, 0, 22, 6);

  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(p.facing > 0 ? 2 : -9, 5, 6, 4);
  ctx.fillStyle = '#333';
  ctx.fillRect(p.facing > 0 ? 4 : -7, 6, 3, 3);

  // Jersey number
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(p.num, 0, 32);

  ctx.restore();
}

function drawBallChar() {
  ctx.save();
  ctx.translate(ball.x, ball.y);
  const rot = (ball.x - W/2) * 0.06;
  ctx.rotate(rot);

  // Shadow on ground
  const dy = GROUND - ball.y - ball.r;
  if (dy > 0 && dy < 200) {
    const alpha = 0.3 * (1 - dy / 200);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.beginPath();
    ctx.ellipse(0, ball.r + dy, ball.r * (1 - dy / 300), 4, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Ball base
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, 0, ball.r, 0, Math.PI*2); ctx.fill();

  // Hex patches
  ctx.fillStyle = '#212121';
  ctx.beginPath(); ctx.arc(0, 0, ball.r * 0.3, 0, Math.PI*2); ctx.fill();
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * Math.PI * 2 - 0.3;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * ball.r * 0.6, Math.sin(a) * ball.r * 0.6, ball.r * 0.2, 0, Math.PI*2);
    ctx.fill();
  }

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath(); ctx.arc(-ball.r * 0.3, -ball.r * 0.35, ball.r * 0.25, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5 * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawHUD() {
  // Scoreboard
  const sbW = 210, sbH = 62, sbX = W/2 - sbW/2, sbY = 8;
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  roundRect(sbX, sbY, sbW, sbH, 12); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1.5;
  roundRect(sbX, sbY, sbW, sbH, 12); ctx.stroke();

  // Blue side
  ctx.fillStyle = '#1565c0';
  roundRect(sbX+5, sbY+5, sbW/2-8, sbH-10, 8); ctx.fill();
  ctx.fillStyle = '#42a5f5';
  roundRect(sbX+5, sbY+5, sbW/2-8, sbH/2-5, 8); ctx.fill();

  // Red side
  ctx.fillStyle = '#b71c1c';
  roundRect(sbX+sbW/2+3, sbY+5, sbW/2-8, sbH-10, 8); ctx.fill();
  ctx.fillStyle = '#ef5350';
  roundRect(sbX+sbW/2+3, sbY+5, sbW/2-8, sbH/2-5, 8); ctx.fill();

  // Scores
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px Arial';
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,0,0,0.5)'; ctx.shadowBlur = 4;
  ctx.fillText(score[0], sbX + sbW/4, sbY + 48);
  ctx.fillText(score[1], sbX + sbW*3/4, sbY + 48);
  ctx.shadowBlur = 0;

  // Divider & dash
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillRect(sbX+sbW/2-2, sbY+8, 4, sbH-16);
  ctx.font = 'bold 16px Arial';
  ctx.fillText('–', sbX+sbW/2, sbY+42);

  // Timer
  const mins = Math.floor(gameTime / 60);
  const secs = Math.floor(gameTime % 60);
  ctx.font = `bold 15px Arial`;
  ctx.fillStyle = gameTime < 20 ? '#ff5252' : 'rgba(255,255,255,0.8)';
  ctx.fillText(`${mins}:${secs.toString().padStart(2,'0')}`, W/2, sbY + sbH + 16);

  // Controls hint
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '12px Arial';
  ctx.fillText('WASD / Arrows: Move   W/Space: Jump   X or Z: Kick', W/2, H - 8);

  // Goal flash
  if (goalFlash > 0) {
    const alpha = Math.min(0.45, (goalFlash / 60) * 0.45);
    ctx.fillStyle = goalSide === 0
      ? `rgba(66,165,245,${alpha})`
      : `rgba(239,83,80,${alpha})`;
    ctx.fillRect(0, 0, W, H);

    const t = goalFlash / 150;
    const sz = 90 + (1 - t) * 20;
    ctx.font = `bold ${sz}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.shadowColor = goalSide === 0 ? '#42a5f5' : '#ef5350';
    ctx.shadowBlur = 30;
    ctx.fillText('GOAL!', W/2, H/2 + 30);
    ctx.shadowBlur = 0;
    goalFlash--;
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.82)';
  ctx.fillRect(0, 0, W, H);

  ctx.font = 'bold 58px Arial';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000'; ctx.shadowBlur = 10;
  ctx.fillText('FULL TIME', W/2, H/2 - 70);
  ctx.shadowBlur = 0;

  ctx.font = 'bold 44px Arial';
  if (score[0] > score[1]) {
    ctx.fillStyle = '#42a5f5';
    ctx.fillText('BLUE WINS! 🏆', W/2, H/2 + 10);
  } else if (score[1] > score[0]) {
    ctx.fillStyle = '#ef5350';
    ctx.fillText('RED WINS! 🏆', W/2, H/2 + 10);
  } else {
    ctx.fillStyle = '#ffd740';
    ctx.fillText("IT'S A DRAW!", W/2, H/2 + 10);
  }

  ctx.font = '30px Arial';
  ctx.fillStyle = '#fff';
  ctx.fillText(`${score[0]}  –  ${score[1]}`, W/2, H/2 + 65);

  ctx.font = '18px Arial';
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.fillText('Press R to play again', W/2, H/2 + 110);
}

// --- Main loop ---
function loop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  if (!gameOver) {
    if (resetTimer > 0) {
      resetTimer--;
    } else {
      gameTime -= dt;
      if (gameTime <= 0) { gameTime = 0; gameOver = true; }
    }
    updatePlayer(dt);
    updateAI(dt);
    updateBall();
    updateParticles(dt);
  }

  ctx.clearRect(0, 0, W, H);
  drawField();
  drawParticles();
  drawPlayerChar(P, true);
  drawPlayerChar(AI, false);
  drawBallChar();
  drawHUD();
  if (gameOver) drawGameOver();

  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
