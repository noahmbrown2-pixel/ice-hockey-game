// ── UTILS ─────────────────────────────────────────────────────────────
function rand(a,b){return Math.random()*(b-a)+a}
function randI(a,b){return Math.floor(rand(a,b+1))}
function clamp(v,mn,mx){return Math.max(mn,Math.min(mx,v))}
function lerp(a,b,t){return a+(b-a)*t}
function lerpCol(c0,c1,t){
  const p=c=>{const n=parseInt(c.slice(1),16);return[(n>>16)&255,(n>>8)&255,n&255];};
  const[r0,g0,b0]=p(c0),[r1,g1,b1]=p(c1);
  return`rgb(${~~lerp(r0,r1,t)},${~~lerp(g0,g1,t)},${~~lerp(b0,b1,t)})`;
}

// ── CAMERA ────────────────────────────────────────────────────────────
let cam={x:0,shake:0};
let shX=0,shY=0;
function updateCam(){
  const tx=P.x+P.w/2-W/2;
  cam.x=lerp(cam.x,clamp(tx,0,WORLD_W-W),0.12);
  if(cam.shake>0){cam.shake=Math.max(0,cam.shake-0.4);shX=rand(-cam.shake,cam.shake);shY=rand(-cam.shake,cam.shake);}
  else{shX=0;shY=0;}
}
function addShake(a){cam.shake=Math.max(cam.shake,a);}
function toSX(wx){return wx-cam.x+shX;}
function toSY(wy){return wy+shY;}

// ── DAY / NIGHT (20 min each = 2400s cycle) ───────────────────────────
let dayTime=300; // start mid-day
const DAY_LEN=2400;
function getDayPct(){return dayTime/DAY_LEN;}
function isNight(){const t=getDayPct();return t>0.55&&t<1.0;}
function getNightAlpha(){
  const t=getDayPct();
  if(t<0.25)return lerp(0.4,0,t/0.25);
  if(t<0.5)return 0;
  if(t<0.65)return lerp(0,0.78,(t-0.5)/0.15);
  return 0.78;
}
function getDayLabel(){const t=getDayPct();return t<0.25?'Dawn':t<0.5?'Day':t<0.65?'Dusk':'Night';}

// ── WEATHER ───────────────────────────────────────────────────────────
let weather='clear',weatherTimer=180;
let rainParts=[];
let blizzParts=[],sandParts=[],ashParts=[];
function updateWeather(dt){
  weatherTimer-=dt;
  if(weatherTimer<=0){
    const bm=getBiome(P.x).name;
    const r=Math.random();
    if(bm==='Desert'){weather=r<0.3?'sandstorm':r<0.5?'fog':'clear';}
    else if(bm==='Volcanic'){weather=r<0.3?'ashfall':r<0.45?'fog':'clear';}
    else if(bm==='Crystal Wastes'){weather=r<0.45?'blizzard':r<0.55?'fog':'clear';}
    else{weather=r<0.25?'rain':r<0.3?'thunderstorm':r<0.4?'fog':'clear';}
    weatherTimer=rand(60,240);
  }
  if(weather==='rain'||weather==='thunderstorm'){
    while(rainParts.length<200)rainParts.push({x:rand(0,W),y:rand(-20,GY),vy:rand(10,16),vx:rand(-2,0.5)});
    for(let i=rainParts.length-1;i>=0;i--){const r=rainParts[i];r.x+=r.vx;r.y+=r.vy;if(r.y>GY)rainParts.splice(i,1);}
  } else rainParts=[];
  if(weather==='blizzard'){
    while(blizzParts.length<180)blizzParts.push({x:rand(0,W),y:rand(-20,GY),vy:rand(4,9),vx:rand(-8,-3)});
    for(let i=blizzParts.length-1;i>=0;i--){const b=blizzParts[i];b.x+=b.vx;b.y+=b.vy;if(b.y>GY||b.x<-10)blizzParts.splice(i,1);}
  } else blizzParts=[];
  if(weather==='sandstorm'){
    while(sandParts.length<150)sandParts.push({x:rand(0,W),y:rand(0,GY),vy:rand(-1,1),vx:rand(6,14),alpha:rand(0.3,0.8)});
    for(let i=sandParts.length-1;i>=0;i--){const s=sandParts[i];s.x+=s.vx;s.y+=s.vy;if(s.x>W+10)sandParts.splice(i,1);}
  } else sandParts=[];
  if(weather==='ashfall'){
    while(ashParts.length<120)ashParts.push({x:rand(0,W),y:rand(-20,GY),vy:rand(1,3),vx:rand(-1,1)});
    for(let i=ashParts.length-1;i>=0;i--){const a=ashParts[i];a.x+=a.vx;a.y+=a.vy;if(a.y>GY)ashParts.splice(i,1);}
  } else ashParts=[];
}

initMonsters();

// ── MONSTER PROJECTILES ───────────────────────────────────────────────
let mProjs=[];
function mkMProj(x,y,vx,vy,dmg,col,pw,ph,life,sType){mProjs.push({x,y,vx,vy,dmg,col,w:pw||14,h:ph||14,life,sType});}

// ── STATUS EFFECTS ────────────────────────────────────────────────────
function applyStatus(type){
  switch(type){
    case'fire':   P.burn=Math.max(P.burn,14);break;
    case'poison': P.poison=Math.max(P.poison,22);break;
    case'ice':    P.freeze=Math.max(P.freeze,6);break;
    case'thunder':P.paralyze=Math.max(P.paralyze,2.5);break;
    case'dragon': P.dragonBlight=Math.max(P.dragonBlight,28);break;
    case'blast':  P.blastBuildup+=24;break;
    case'water':  P.paralyze=Math.max(P.paralyze,1.5);P.burn=0;break;
    case'crystal':P.paralyze=Math.max(P.paralyze,3);break;
    case'earth':  P.paralyze=Math.max(P.paralyze,1.2);break;
    case'wind':   P.vy=Math.min(P.vy,-8);P.vx+=P.facing*-3;break;
  }
}
function updateStatus(dt){
  if(P.burn>0){P.burn=Math.max(0,P.burn-dt);P.burnTick-=dt;if(P.burnTick<=0){P.burnTick=5;takeDmg(5,true);spE(P.x+P.w/2,P.y,4,'#ff8800',2);}}
  if(P.poison>0){P.poison=Math.max(0,P.poison-dt);P.poisonTick-=dt;if(P.poisonTick<=0){P.poisonTick=6;takeDmg(3,true);spE(P.x+P.w/2,P.y,4,'#88ff44',2);}}
  if(P.freeze>0)P.freeze=Math.max(0,P.freeze-dt);
  if(P.paralyze>0)P.paralyze=Math.max(0,P.paralyze-dt);
  if(P.dragonBlight>0)P.dragonBlight=Math.max(0,P.dragonBlight-dt);
  if(P.blastBuildup>100){P.blastBuildup=0;takeDmg(~~(P.maxHP*0.2),true);addShake(8);spE(P.x+P.w/2,P.y+P.h/2,22,'#ff8800',8);}
  if(P.blastBuildup>0)P.blastBuildup=Math.max(0,P.blastBuildup-dt*4);
  if(P.gsBuff>0)P.gsBuff-=dt;
  if(P.hornBuff>0)P.hornBuff-=dt;
  if(P.hotDrink>0){P.hotDrink-=dt;}
  // Blizzard slows player
  if(weather==='blizzard'&&P.onGround&&!(P.hotDrink>0)){P.vx*=0.85;}
  // Thunderstorm random lightning strike
  if(weather==='thunderstorm'&&Math.random()<0.0002){takeDmg(15,true);spE(P.x+P.w/2,P.y,8,'#eeeeff',6);showMsg('Lightning strike!',60,'#eeeeff');}
}

// ── DAMAGE ────────────────────────────────────────────────────────────
let flashA=0;
function takeDmg(amt,noInv){
  if(!noInv&&P.invT>0)return;
  if(P.blocking&&!noInv){spE(P.x+P.w/2,P.y+P.h/2,5,'#aaaaff',3);return;}
  const def=getArmDef();
  const actual=Math.max(1,~~(amt-def*0.6));
  P.hp=Math.max(0,P.hp-actual);
  if(!noInv){P.invT=0.9;flashA=0.5;}
  spE(P.x+P.w/2,P.y+P.h/2,5,'#ff4444',4);
  if(P.hp<=0)gs=ST.DEAD;
}

// ── PLAYER ATTACK ─────────────────────────────────────────────────────
let dmgNums=[];
function playerAttack(charged){
  const wt=WEAPONS[save.weaponType].type;
  const range=getWpnRange();
  const ax=P.facing>0?P.x+P.w:P.x-range;
  let baseDmg=getWpnDmg();
  if(charged)baseDmg=~~(baseDmg*(wt==='gs'?3.5:wt==='bow'?2.2:1.5));
  if(P.hornBuff>0)baseDmg=~~(baseDmg*1.3);

  // Bow shoots projectile
  if(wt==='bow'){
    const spd=(charged?14:8)*P.facing;
    mProjs.push({x:P.x+P.w/2,y:P.y+P.h*0.4,vx:spd,vy:0,dmg:baseDmg,col:'#ffdd44',w:14,h:6,life:90,sType:null,fromPlayer:true});
    return;
  }

  for(const m of monsters){
    if(!m.alive)continue;
    if(m.x+m.w>ax-8&&m.x<ax+range+8&&Math.abs((m.y+m.h/2)-(P.y+P.h/2))<72){
      const dmg=~~(baseDmg*(0.85+Math.random()*0.3));
      m.hp=Math.max(0,m.hp-dmg);
      if(!m.discovered){m.discovered=true;save.discovered[m.id]=true;showMsg('Discovered: '+m.name+'!',200,'#aaffaa');}
      if(m.state!=='hunt'&&m.state!=='flee')m.state='hunt';
      spE(m.x+m.w/2,m.y+m.h/2,10,'#ffdd44',5);
      dmgNums.push({x:m.x+m.w/2,y:m.y-10,val:dmg,t:60,col:'#ffdd44'});
      addShake(2);
      if(m.hp<=0)killMonster(m);
    }
  }
}
function killMonster(m){
  m.alive=false;
  save.beaten[m.id]=(save.beaten[m.id]||0)+1;
  const coins=~~(m.maxHp*0.06+60);
  save.coins+=coins;
  if(!save.materials[m.loot])save.materials[m.loot]=0;
  const drops=randI(1,3);save.materials[m.loot]+=drops;
  svSave();addShake(14);
  spE(m.x+m.w/2,m.y+m.h/2,40,'#ffdd44',10);
  showMsg(m.name+' slain! +'+coins+'G, '+drops+'x '+m.loot,260,'#ffaa44');
}

// ── MONSTER AI ────────────────────────────────────────────────────────
function updateMonster(m,dt){
  if(!m.alive)return;
  if(m.nightOnly&&!isNight()){m.state='sleep';m.vx*=0.9;doPhysics(m);return;}
  if(m.stunT>0){m.stunT-=dt;m.vx*=0.8;doPhysics(m);return;}
  if(m.atkCd>0)m.atkCd-=dt;
  m.stateT=Math.max(0,m.stateT-dt);
  m.fpT-=dt;
  if(m.fpT<=0&&m.state!=='sleep'){m.fpT=0.6+Math.random()*0.5;addFP(m.x+m.w/2,GY-3,m.w*0.1,m.col);}
  const px=P.x+P.w/2,mx=m.x+m.w/2,dx=px-mx,dy=(P.y+P.h/2)-(m.y+m.h/2),dst=Math.hypot(dx,dy);
  if(m.state==='sleep'){
    m.vx*=0.9;if(dst<m.sight*0.35){m.state='alert';m.stateT=2;showMsg(m.name+' stirs...',90);}
  } else if(m.state==='roam'){
    if(dst<m.sight){m.state='alert';m.stateT=1.6;showMsg(m.name+' spotted you!',110);}
    m.roamT-=dt;if(m.roamT<=0){m.roamDir*=-1;m.roamT=rand(60,160);}
    if(mx+m.roamDir*m.w<m.homeX-500||mx+m.roamDir*m.w>m.homeX+500)m.roamDir*=-1;
    m.vx=m.roamDir*m.spd*0.4;
  } else if(m.state==='alert'){
    m.vx*=0.85;if(m.stateT<=0&&dst<m.sight*0.9)m.state='hunt';if(dst>m.sight*2)m.state='roam';
  } else if(m.state==='hunt'){
    if(dst>m.sight*2.5)m.state='roam';
    if(m.hp/m.maxHp<0.15&&dst>80){m.state='flee';showMsg(m.name+' is fleeing!',110,'#88aaff');}
    if(Math.abs(dx)>m.w*0.55)m.vx=Math.sign(dx)*m.spd;
    else{m.vx*=0.7;if(m.atkCd<=0){doMAtk(m,dx,dy,dst);m.atkCd=rand(1.3,2.8);}}
    if(m.w>=115&&dst<360)addShake(lerp(5,0,dst/360));
  } else if(m.state==='flee'){
    m.vx=-Math.sign(dx)*m.spd*1.7;if(dst>700||m.hp/m.maxHp>0.4)m.state='roam';
  }
  // Safe zone — monster gives up chase if player is in camp
  if(P.x>=CAMP_X1&&P.x<=CAMP_X2&&(m.state==='hunt'||m.state==='alert')){m.state='roam';}
  if(m.flies){
    const ty=(m.state==='hunt'?GY-m.h-80:GY-m.h-50)+Math.sin(Date.now()*0.001)*20;
    m.flyY=lerp(m.flyY,ty,0.03);m.vy+=(m.flyY-m.y)*0.045;m.vy*=0.88;
    if(m.y+m.h>GY&&m.state!=='hunt'){m.y=GY-m.h;m.vy=-3;}if(m.y<15){m.y=15;m.vy=0;}
  } else {m.vy+=GRAV*0.5;if(m.y+m.h>GY){m.y=GY-m.h;m.vy=0;}}
  m.x+=m.vx;m.y+=m.vy;
  // Clamp monster out of safe zone
  if(m.x+m.w>CAMP_X1&&m.x<CAMP_X2){m.x=m.vx>=0?CAMP_X1-m.w:CAMP_X2;m.vx=0;}
  m.x=clamp(m.x,10,WORLD_W-m.w-10);
}
function doPhysics(m){if(m.flies){m.vy*=0.9;}else{m.vy+=GRAV*0.5;if(m.y+m.h>GY){m.y=GY-m.h;m.vy=0;}}m.x+=m.vx;m.y+=m.vy;}
function doMAtk(m,dx,dy,dst){
  const dmg=m.dmg*(0.8+Math.random()*0.4);
  if(dst<m.w+P.w+12){takeDmg(dmg);applyStatus(m.type);addShake(7);m.vx=Math.sign(dx)*2.5;return;}
  if(dst<m.sight*0.8&&Math.random()<0.4){const len=Math.hypot(dx,dy),spd=5+Math.random()*3;mkMProj(m.x+m.w/2,m.y+m.h/2,(dx/len)*spd,(dy/len)*spd,dmg*0.6,m.ac,14,14,90,m.type);}
}

// ── GAME STATES ───────────────────────────────────────────────────────
const ST={MENU:0,VILLAGE:1,WORLD:2,DEAD:3,PAUSE:4};
let gs=ST.MENU,pauseFrom=ST.VILLAGE,lt=0;

// ── VILLAGE UI STATE ──────────────────────────────────────────────────
let villTab=0; // 0=main, 1=questboard, 2=blacksmith, 3=shop
let villSel=0;
let bsmTab=0; // 0=weapon upgrade, 1=armor upgrade, 2=weapon switch

// ── UPDATE (WORLD) ────────────────────────────────────────────────────
function update(dt){
  dayTime=(dayTime+dt)%DAY_LEN;
  updateWeather(dt);
  const wt=WEAPONS[save.weaponType].type;
  const frozen=P.freeze>0.1||P.paralyze>0.5;
  if(!frozen){
    if(K['ArrowLeft']||K['KeyA']){P.vx=Math.max(P.vx-2,-TVEL);P.facing=-1;}
    else if(K['ArrowRight']||K['KeyD']){P.vx=Math.min(P.vx+2,TVEL);P.facing=1;}
    else P.vx*=0.72;
    if((K['ArrowUp']||K['KeyW']||K['Space'])&&P.onGround){P.vy=-13.5;P.onGround=false;}
  } else P.vx*=0.5;
  P.vy+=GRAV;P.x+=P.vx;P.y+=P.vy;
  if(P.y+P.h>=GY){P.y=GY-P.h;P.vy=0;P.onGround=true;}else P.onGround=false;
  P.x=clamp(P.x,0,WORLD_W-P.w);
  // Run animation
  if(P.onGround&&Math.abs(P.vx)>1){P.runT+=dt;if(P.runT>0.12){P.runT=0;P.runF=(P.runF+1)%4;}}else{P.runF=0;P.runT=0;}
  if(P.invT>0)P.invT-=dt;if(P.atkCd>0)P.atkCd-=dt;if(P.potCd>0)P.potCd-=dt;
  updateStatus(dt);
  // Blocking (sns / lance)
  P.blocking=(wt==='sns'||wt==='lance')&&(K['KeyF']);
  // Charge attack
  if(K['KeyJ']&&(wt==='gs'||wt==='bow'))P.chargeT+=dt;
  if(pressed('KeyJ')||pressed('KeyZ')){
    if(P.atkCd<=0){
      const charged=P.chargeT>0.8;P.chargeT=0;
      P.atkCd=getWpnSpd()+( charged?0.3:0);P.atkSwing=8;
      playerAttack(charged);
    }else P.chargeT=0;
  }
  if(!K['KeyJ'])P.chargeT=0;
  if(P.atkSwing>0)P.atkSwing=Math.max(0,P.atkSwing-dt*14);
  // Special weapon actions
  if(pressed('KeyK')&&P.atkCd<=0){
    if(wt==='ig'){P.vy=-14;P.onGround=false;P.atkCd=0.5;playerAttack(false);}
    else if(wt==='hh'){P.hornBuff=20;showMsg('Horn melody! +30% DMG 20s',100,'#aaffff');P.atkCd=1;}
    else if(wt==='sa'){playerAttack(true);P.atkCd=0.6;}
    else if(wt==='db'){playerAttack(false);P.atkCd=0.1;}
  }
  // Potion
  if(pressed('KeyH')&&P.hp<P.maxHP&&P.potCd<=0&&save.potions>0){
    P.hp=Math.min(P.maxHP,P.hp+~~(P.maxHP*0.35));save.potions--;P.potCd=10;
    spE(P.x+P.w/2,P.y+P.h/2,8,'#66ff66',3);svSave();showMsg('Potion used!',60,'#66ff66');
  }
  // Return to village (near left edge)
  if(P.x<500&&pressed('KeyE')){gs=ST.VILLAGE;villTab=0;P.x=400;P.y=GY-P.h;cam.x=0;}
  // Starter chest pickup
  if(!starterChest.taken&&P.x+P.w>starterChest.x-20&&P.x<starterChest.x+20){
    starterChest.taken=true;
    save.weaponType=0;save.potions=Math.min(save.maxPotions,save.potions+2);svSave();
    spE(starterChest.x,GY-20,16,'#ffdd44',6);
    showMsg('Starter Kit! Iron Sword & Shield + 2 Potions  [J]=Attack  [H]=Potion',280,'#ffdd44');
  }
  // Monster projectiles
  for(let i=mProjs.length-1;i>=0;i--){
    const p=mProjs[i];p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0||p.y>H+20){mProjs.splice(i,1);continue;}
    if(p.fromPlayer){
      for(const m of monsters){if(!m.alive)continue;if(p.x<m.x+m.w&&p.x+p.w>m.x&&p.y<m.y+m.h&&p.y+p.h>m.y){const d=~~(p.dmg*(0.85+Math.random()*0.3));m.hp-=d;if(!m.discovered){m.discovered=true;save.discovered[m.id]=true;}if(m.state!=='hunt')m.state='hunt';dmgNums.push({x:m.x+m.w/2,y:m.y-10,val:d,t:60,col:'#ffdd44'});spE(m.x+m.w/2,m.y+m.h/2,6,'#ffdd44',4);if(m.hp<=0)killMonster(m);mProjs.splice(i,1);break;}}
    } else {
      if(p.x<P.x+P.w&&p.x+p.w>P.x&&p.y<P.y+P.h&&p.y+p.h>P.y){takeDmg(p.dmg);if(p.sType)applyStatus(p.sType);mProjs.splice(i,1);}
    }
  }
  for(const m of monsters)updateMonster(m,dt);
  // Fatalis night respawn
  const fat=monsters.find(x=>x.id==='fat');
  if(fat&&!fat.alive&&isNight()){fat.alive=true;fat.hp=fat.maxHp;fat.state='roam';fat.x=fat.homeX;fat.y=GY-fat.h;fat.discovered=false;}
  for(let i=footprints.length-1;i>=0;i--){footprints[i].age++;if(footprints[i].age>footprints[i].maxAge)footprints.splice(i,1);}
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.08;p.l--;if(p.l<=0)parts.splice(i,1);}
  for(let i=dmgNums.length-1;i>=0;i--){dmgNums[i].y-=0.5;dmgNums[i].t--;if(dmgNums[i].t<=0)dmgNums.splice(i,1);}
  updateCam();
  if(flashA>0)flashA=Math.max(0,flashA-dt*1.5);
  if(camMsgT>0)camMsgT--;
}

// ── DRAW BACKGROUND (TERRARIA STYLE) ─────────────────────────────────
function drawBG(){
  const cx=cam.x+W/2;
  const b=getBiome(cx);
  // Sky
  const gr=X.createLinearGradient(0,0,0,GY);
  gr.addColorStop(0,b.sky0);gr.addColorStop(1,b.sky1);
  X.fillStyle=gr;X.fillRect(0,0,W,H);
  // Background wall tiles (Terraria style)
  const ws=24;
  const startWX=Math.floor(cam.x/ws)*ws;
  for(let bx=startWX;bx<cam.x+W+ws;bx+=ws){
    const wb=getBiome(bx);
    for(let by=GY-160;by<GY;by+=ws){
      const shade=Math.sin(bx*0.3+by*0.2)*0.06;
      X.fillStyle=wb.wall;X.fillRect(toSX(bx),toSY(by),ws-1,ws-1);
      X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(toSX(bx),toSY(by),ws-1,1);
      X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(toSX(bx),toSY(by),1,ws-1);
    }
  }
  // Ground layers (block style)
  const bs=32;
  const startX=Math.floor(cam.x/bs)*bs;
  for(let bx=startX;bx<cam.x+W+bs;bx+=bs){
    const gb=getBiome(bx);
    // Surface block
    X.fillStyle=gb.ground;X.fillRect(toSX(bx),toSY(GY),bs,16);
    X.fillStyle='rgba(255,255,255,0.07)';X.fillRect(toSX(bx),toSY(GY),bs,3);
    X.fillStyle='rgba(0,0,0,0.2)';X.fillRect(toSX(bx),toSY(GY),1,16);
    // Dirt layer
    X.fillStyle=gb.dirt;X.fillRect(toSX(bx),toSY(GY+16),bs,28);
    X.fillStyle='rgba(0,0,0,0.15)';X.fillRect(toSX(bx),toSY(GY+16),1,28);
    // Stone layer
    X.fillStyle=gb.stone;X.fillRect(toSX(bx),toSY(GY+44),bs,H-GY-44);
    X.fillStyle='rgba(255,255,255,0.04)';X.fillRect(toSX(bx),toSY(GY+44),bs,3);
    // Ore veins
    if((bx/bs)%7===0){X.fillStyle='rgba(255,255,100,0.2)';X.fillRect(toSX(bx+8),toSY(GY+54),8,8);}
    if((bx/bs)%11===0){X.fillStyle='rgba(100,200,255,0.2)';X.fillRect(toSX(bx+18),toSY(GY+70),8,8);}
  }
}

      // Door

// ── DRAW FOOTPRINTS & TRACKS ──────────────────────────────────────────
function drawFP(){
  for(const f of footprints){
    const fx=toSX(f.x);if(fx<-10||fx>W+10)continue;
    X.globalAlpha=Math.max(0,(1-f.age/f.maxAge)*0.5);
    X.fillStyle=f.col;X.fillRect(fx-f.sz,toSY(f.y)-2,f.sz*2,3);X.globalAlpha=1;
  }
  for(const t of tracks){
    const tx=toSX(t.x);if(tx<-20||tx>W+20)continue;
    if(t.type==='scratch'){X.strokeStyle='#aa7744';X.lineWidth=1.5;X.beginPath();X.moveTo(tx-8,toSY(t.y));X.lineTo(tx+5,toSY(t.y+8));X.stroke();X.beginPath();X.moveTo(tx-3,toSY(t.y));X.lineTo(tx+10,toSY(t.y+7));X.stroke();}
    else if(t.type==='bone'){X.fillStyle='#ddd8b0';X.fillRect(tx-9,toSY(t.y)-3,18,4);X.fillRect(tx-4,toSY(t.y)-7,4,7);X.fillRect(tx+2,toSY(t.y)-6,4,6);}
  }
}

// ── DRAW MONSTER ──────────────────────────────────────────────────────
function drawMonster(m){
  if(!m.alive)return;
  const msx=toSX(m.x),msy=toSY(m.y);
  if(msx+m.w<-120||msx>W+120)return;
  const pDist=Math.abs((m.x+m.w/2)-(P.x+P.w/2));
  if(pDist>m.sight+80){
    X.globalAlpha=0.15;X.fillStyle='#000';X.fillRect(msx,msy,m.w,m.h);
    X.globalAlpha=0.07;X.fillStyle=m.ac;X.fillRect(msx-5,msy-5,m.w+10,m.h+10);X.globalAlpha=1;return;
  }
  X.globalAlpha=m.state==='sleep'?0.5:1;
  // Type glow
  const gc={fire:'rgba(255,80,0,0.15)',thunder:'rgba(255,240,0,0.14)',poison:'rgba(80,255,50,0.14)',water:'rgba(40,140,255,0.14)',ice:'rgba(140,210,255,0.16)',dragon:'rgba(170,40,255,0.14)',blast:'rgba(255,110,0,0.15)',crystal:'rgba(160,110,255,0.16)',earth:'rgba(180,140,50,0.11)',wind:'rgba(180,255,200,0.12)'};
  X.fillStyle=gc[m.type]||'rgba(200,200,255,0.1)';X.fillRect(msx-6,msy-6,m.w+12,m.h+12);
  // Body
  X.fillStyle=m.col;X.fillRect(msx,msy,m.w,m.h);
  // Accent bands
  X.fillStyle=m.ac;X.fillRect(msx+4,msy+5,m.w-8,9);X.fillRect(msx+4,msy+m.h-15,m.w-8,9);
  // Belly
  X.fillStyle='rgba(255,255,200,0.09)';X.fillRect(msx+~~(m.w*0.2),msy+~~(m.h*0.3),~~(m.w*0.6),~~(m.h*0.4));
  // Eyes
  const eDir=m.vx>=0?1:-1;const eX=eDir>0?msx+m.w-20:msx+8;
  X.fillStyle='#ee2222';X.fillRect(eX,msy+9,9,9);X.fillStyle='#000';X.fillRect(eX+2,msy+11,5,5);X.fillStyle='#fff';X.fillRect(eX+6,msy+11,2,2);
  // Legs
  X.fillStyle=m.col;
  const lb=m.state!=='sleep'?Math.sin(Date.now()*0.005+m.homeX)*4:0;
  if(m.w>=100){X.fillRect(msx+8,msy+m.h,10,14+lb);X.fillRect(msx+~~(m.w/2)-5,msy+m.h,10,12-lb);X.fillRect(msx+m.w-22,msy+m.h,10,14+lb);X.fillRect(msx+~~(m.w/2)+5,msy+m.h,10,12-lb);}
  else{X.fillRect(msx+8,msy+m.h,9,12+lb);X.fillRect(msx+m.w-17,msy+m.h,9,12-lb);}
  // Tail
  X.fillStyle=m.ac;X.fillRect(eDir>0?msx-14:msx+m.w+2,msy+~~(m.h*0.5),14,8);
  // Wings (flying)
  if(m.flies){const wf=Math.sin(Date.now()*0.007)*15;X.fillStyle=m.ac;X.fillRect(msx-24,msy+8+wf,24,~~(m.h*0.42));X.fillRect(msx+m.w,msy+8-wf,24,~~(m.h*0.42));X.fillStyle='rgba(255,255,255,0.08)';X.fillRect(msx-22,msy+10+wf,20,~~(m.h*0.32));X.fillRect(msx+m.w+2,msy+10-wf,20,~~(m.h*0.32));}
  // Spines on large
  if(m.w>=105){X.fillStyle=m.ac;X.fillRect(msx+~~(m.w*0.28),msy-11,6,13);X.fillRect(msx+~~(m.w*0.5),msy-15,6,17);X.fillRect(msx+~~(m.w*0.72),msy-11,6,13);}
  X.globalAlpha=1;
  // HP bar (discovered only)
  if(m.discovered){
    const bw=m.w+22,bx2=msx-11,by2=msy-22;
    X.fillStyle='rgba(0,0,0,0.7)';X.fillRect(bx2-1,by2-1,bw+2,10);
    X.fillStyle='#333';X.fillRect(bx2,by2,bw,8);
    const pct=m.hp/m.maxHp;X.fillStyle=pct>0.5?'#44ee44':pct>0.25?'#eeee44':'#ee3333';X.fillRect(bx2,by2,~~(bw*pct),8);
    X.fillStyle='#fff';X.font='9px monospace';X.fillText(m.name,bx2,by2-3);
  } else if(pDist<m.sight+50){X.fillStyle='#ffdd44';X.font='bold 14px monospace';X.fillText('?',msx+m.w/2-4,msy-10);}
  // State icons
  if(m.state==='alert'){X.fillStyle='#ffdd44';X.font='bold 15px monospace';X.fillText('!',msx+m.w/2-3,msy-24);}
  else if(m.state==='hunt'){X.fillStyle='#ff4444';X.font='bold 15px monospace';X.fillText('!!',msx+m.w/2-8,msy-24);}
  else if(m.state==='flee'){X.fillStyle='#88aaff';X.font='bold 13px monospace';X.fillText('~',msx+m.w/2-4,msy-24);}
  else if(m.state==='sleep'){X.fillStyle='#aaccff';X.font='10px monospace';X.fillText('z z',msx+m.w/2-9,msy-12);}
}

// ── DRAW PLAYER ───────────────────────────────────────────────────────
function drawPlayer(){
  const psx=toSX(P.x),psy=toSY(P.y);const fl=P.facing;
  const leg=Math.sin(P.runF*1.57);const wt=WEAPONS[save.weaponType].type;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.28)';X.fillRect(psx+2,toSY(GY)-3,P.w-4,4);
  // Legs
  X.fillStyle='#3a3a6a';
  if(P.onGround&&Math.abs(P.vx)>1){X.fillRect(psx+4,psy+34,10,P.h-34+leg*6);X.fillRect(psx+14,psy+34,10,P.h-34-leg*6);}
  else{X.fillRect(psx+4,psy+34,10,P.h-34);X.fillRect(psx+14,psy+34,10,P.h-34);}
  X.fillStyle='#4a3a1a';X.fillRect(psx+2,psy+P.h-4,12,6);X.fillRect(psx+12,psy+P.h-4,12,6);
  // Body (blink if hit)
  X.fillStyle=(P.invT>0&&Math.floor(Date.now()/80)%2)?'#fff':'#4a6aaa';
  X.fillRect(psx+2,psy+16,P.w-4,22);
  X.fillStyle='#8a6a3a';X.fillRect(psx+2,psy+34,P.w-4,4);
  // Weapon + arm
  const sw=P.atkSwing*0.3,ch=Math.min(P.chargeT/0.8,1);
  X.fillStyle='#c09060';
  if(fl>0){X.fillRect(psx-4,psy+18,8,8);X.fillRect(psx+P.w-4+sw,psy+16,8,8);}
  else{X.fillRect(psx+P.w-4,psy+18,8,8);X.fillRect(psx-4-sw,psy+16,8,8);}
  // Weapon shape by type
  const wCol={sns:'#aaaacc',gs:'#cc8833',bow:'#8a6030',db:'#aacc88',ham:'#885533',lance:'#aaaaaa',sa:'#88aacc',ig:'#ccaa44',hh:'#aa8866'};
  X.fillStyle=wCol[wt]||'#aaaacc';
  if(ch>0){X.fillStyle=`rgba(255,220,100,${ch})`;X.fillRect(psx+P.w/2-8,psy-6,16,6);} // charge glow
  if(fl>0){
    if(wt==='bow'){X.fillRect(psx+P.w+6+sw*2,psy+10,4,28);X.fillRect(psx+P.w+4+sw*2,psy+10,10,3);X.fillRect(psx+P.w+4+sw*2,psy+35,10,3);}
    else if(wt==='lance'){X.fillRect(psx+P.w+5+sw*3,psy+8+sw,4,36);}
    else if(wt==='gs'){X.fillRect(psx+P.w+5+sw*3,psy+8+sw,8,32);}
    else X.fillRect(psx+P.w+4+sw*3,psy+12+sw,5,24);
  } else {
    if(wt==='bow'){X.fillRect(psx-10-sw*2,psy+10,4,28);X.fillRect(psx-14-sw*2,psy+10,10,3);X.fillRect(psx-14-sw*2,psy+35,10,3);}
    else if(wt==='lance'){X.fillRect(psx-9-sw*3,psy+8+sw,4,36);}
    else if(wt==='gs'){X.fillRect(psx-13-sw*3,psy+8+sw,8,32);}
    else X.fillRect(psx-9-sw*3,psy+12+sw,5,24);
  }
  // Shield (sns/lance)
  if((wt==='sns'||wt==='lance')&&fl>0){X.fillStyle='#6688aa';X.fillRect(psx-6,psy+18,8,18);}
  if((wt==='sns'||wt==='lance')&&fl<0){X.fillStyle='#6688aa';X.fillRect(psx+P.w-2,psy+18,8,18);}
  // Horn glow
  if(P.hornBuff>0&&wt==='hh'){X.fillStyle=`rgba(100,255,255,0.3)`;X.fillRect(psx-4,psy,P.w+8,P.h+4);}
  // Head
  X.fillStyle='#c09060';X.fillRect(psx+4,psy,P.w-8,18);
  X.fillStyle='#3a5a8a';X.fillRect(psx+3,psy,P.w-6,8);X.fillRect(psx+2,psy+2,P.w-4,6);
  const ex=fl>0?psx+P.w-10:psx+4;X.fillStyle='#223355';X.fillRect(ex,psy+8,5,5);
  X.fillStyle='rgba(255,200,100,0.6)';X.fillRect(ex+1,psy+9,3,3);
  // Status overlays
  if(P.burn>0){X.globalAlpha=0.27;X.fillStyle='#ff8800';X.fillRect(psx,psy,P.w,P.h);X.globalAlpha=1;}
  if(P.poison>0){X.globalAlpha=0.27;X.fillStyle='#88ff44';X.fillRect(psx,psy,P.w,P.h);X.globalAlpha=1;}
  if(P.freeze>0||P.paralyze>0.5){X.globalAlpha=0.33;X.fillStyle='#88aaff';X.fillRect(psx,psy,P.w,P.h);X.globalAlpha=1;}
}

// ── HUD ───────────────────────────────────────────────────────────────
function drawHUD(){
  // HP
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(8,8,204,16);
  const hp=P.hp/P.maxHP;X.fillStyle=hp>0.5?'#44ee44':hp>0.25?'#eeee44':'#ee3333';X.fillRect(9,9,~~(202*hp),14);
  X.fillStyle='#fff';X.font='10px monospace';X.fillText(`HP ${P.hp}/${P.maxHP}`,13,21);
  // Potion
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(8,28,130,14);
  X.fillStyle='#33bb66';X.fillRect(9,29,~~(128*(save.potions/save.maxPotions)),12);
  X.fillStyle='#ddf';X.font='9px monospace';X.fillText(`[H] Pot x${save.potions}${P.potCd>0?' ('+Math.ceil(P.potCd)+'s)':''}`,13,40);
  // Blast buildup
  if(P.blastBuildup>0){X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(8,46,104,8);X.fillStyle='#ff6600';X.fillRect(9,47,~~(102*(P.blastBuildup/100)),6);}
  // Charge bar
  if(P.chargeT>0){const ch=Math.min(P.chargeT/0.8,1);X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(8,58,104,8);X.fillStyle='#ffcc00';X.fillRect(9,59,~~(102*ch),6);X.fillStyle='#fff';X.font='8px monospace';X.fillText('CHARGE',13,67);}
  // Status texts
  let si=0;const sx2=10,sy2=70;
  if(P.burn>0){X.fillStyle='#ff8800';X.font='9px monospace';X.fillText(`BURN ${Math.ceil(P.burn)}s`,sx2,sy2+si*13);si++;}
  if(P.poison>0){X.fillStyle='#88ff44';X.fillText(`POISON ${Math.ceil(P.poison)}s`,sx2,sy2+si*13);si++;}
  if(P.freeze>0){X.fillStyle='#88ccff';X.fillText(`FREEZE ${Math.ceil(P.freeze)}s`,sx2,sy2+si*13);si++;}
  if(P.paralyze>0){X.fillStyle='#ffff88';X.fillText(`PARA ${Math.ceil(P.paralyze)}s`,sx2,sy2+si*13);si++;}
  if(P.hornBuff>0){X.fillStyle='#aaffff';X.fillText(`DMG UP ${Math.ceil(P.hornBuff)}s`,sx2,sy2+si*13);si++;}
  // Top right
  X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(W-138,8,130,56);
  X.fillStyle='#ffdd44';X.font='12px monospace';X.fillText(`G ${save.coins}`,W-132,22);
  X.fillStyle=isNight()?'#8899ff':'#ffdd88';X.fillText(getDayLabel(),W-132,38);
  if(weather!=='clear'){X.fillStyle='#88aacc';X.font='9px monospace';X.fillText(weather.toUpperCase(),W-132,50);}
  // Weapon
  const wn=WEAPON_TIERS[save.weaponTier].name+' '+WEAPONS[save.weaponType].name;
  X.fillStyle='#aaaacc';X.font='9px monospace';X.fillText(wn.slice(0,18),W-132,62);
  // Biome
  const bn=getBiome(P.x+P.w/2).name;
  X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(W/2-75,6,150,16);
  X.fillStyle='#cccccc';X.font='11px monospace';X.fillText(bn,W/2-bn.length*3.3,18);
  // Return hint

function drawDayNight(){
  const a=getNightAlpha();
  if(a>0){X.globalAlpha=a;X.fillStyle='#000018';X.fillRect(0,0,W,H);
    if(a>0.3){X.fillStyle='#ffffff';for(let i=0;i<65;i++){const sx=((i*137.5+cam.x*0.015)%WORLD_W+WORLD_W)%(W+40)-20;const sy=((i*83)%(GY*0.72));const tw=0.5+Math.sin(Date.now()*0.002+i)*0.5;X.globalAlpha=a*tw;X.fillRect(sx,sy,i%3===0?3:2,i%3===0?3:2);}}
    if(a>0.45){X.globalAlpha=a;X.fillStyle='#e8e0c0';X.fillRect(W-82,28,30,30);X.fillStyle='#0a0a20';X.fillRect(W-76,32,9,9);X.fillRect(W-64,44,7,7);}
    X.globalAlpha=1;}
  // Dusk/dawn tint
  const t=getDayPct();
  if(t<0.25){X.globalAlpha=lerp(0.18,0,t/0.25);X.fillStyle='#ff8030';X.fillRect(0,0,W,H);}
  else if(t>0.5&&t<0.65){X.globalAlpha=lerp(0,(t-0.5)/0.15)*0.22;X.fillStyle='#cc5020';X.fillRect(0,0,W,H);}
  X.globalAlpha=1;
}
function drawWeather(){
  if(weather==='rain'||weather==='thunderstorm'){
    X.strokeStyle='rgba(110,150,230,0.5)';X.lineWidth=1;
    for(const r of rainParts){X.beginPath();X.moveTo(r.x,r.y);X.lineTo(r.x+r.vx*3,r.y-7);X.stroke();}
    X.globalAlpha=0.07;X.fillStyle='#304060';X.fillRect(0,0,W,H);X.globalAlpha=1;
    if(weather==='thunderstorm'&&Math.random()<0.004){X.globalAlpha=0.55;X.fillStyle='#eeeeff';X.fillRect(0,0,W,H);X.globalAlpha=1;addShake(3);}
  }
  else if(weather==='fog'){
    X.globalAlpha=0.2;X.fillStyle='#c0d0e0';X.fillRect(0,GY-140,W,150);
    X.globalAlpha=0.09;X.fillRect(0,GY-250,W,120);X.globalAlpha=1;
  }
  else if(weather==='blizzard'){
    X.fillStyle='rgba(200,220,255,0.04)';X.fillRect(0,0,W,H);
    X.fillStyle='rgba(220,240,255,0.9)';
    for(const b of blizzParts){X.fillRect(b.x,b.y,2,2);}
    X.globalAlpha=0.12;X.fillStyle='#c0d8ff';X.fillRect(0,0,W,H);X.globalAlpha=1;
  }
  else if(weather==='sandstorm'){
    for(const s of sandParts){X.globalAlpha=s.alpha*0.6;X.fillStyle='#c8a040';X.fillRect(s.x,s.y,3,2);}
    X.globalAlpha=0.18;X.fillStyle='#c8a040';X.fillRect(0,0,W,H);X.globalAlpha=1;
  }
  else if(weather==='ashfall'){
    X.fillStyle='rgba(80,60,50,0.7)';
    for(const a of ashParts){X.fillRect(a.x,a.y,2,2);}
    X.globalAlpha=0.08;X.fillStyle='#504030';X.fillRect(0,0,W,H);X.globalAlpha=1;
  }
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────
function loop(ts){
  const dt=Math.min((ts-lt)/1000,0.07)*60;lt=ts;
  if(gs===ST.MENU){
    if(pressed('Enter')||pressed('Space')){gs=ST.VILLAGE;villTab=0;}
  } else if(gs===ST.VILLAGE){
    // Tab switching
    if(pressed('Digit1'))villTab=1;if(pressed('Digit2'))villTab=2;if(pressed('Digit3'))villTab=3;if(pressed('Digit4'))villTab=4;
    if(pressed('Escape'))villTab=0;
    // Village actions
    if(pressed('KeyR')){P.hp=P.maxHP;P.burn=P.poison=P.freeze=P.paralyze=P.dragonBlight=P.blastBuildup=0;showMsg('Rested! Fully healed.',120,'#88ff88');}
    // BSM tab switching
    if(villTab===2){
      if(pressed('ArrowLeft')||pressed('KeyA'))bsmTab=Math.max(0,bsmTab-1);
      if(pressed('ArrowRight')||pressed('KeyD'))bsmTab=Math.min(2,bsmTab+1);
      if(bsmTab===0&&pressed('Enter')){
        const ti=save.weaponTier;
        if(ti<WEAPON_TIERS.length-1){const next=WEAPON_TIERS[ti+1];const hasMat=!next.mat||(save.materials[next.mat]||0)>=1;const hasG=save.coins>=next.cost;if(hasMat&&hasG){if(next.mat)save.materials[next.mat]--;save.coins-=next.cost;save.weaponTier++;svSave();showMsg('Weapon upgraded to '+WEAPON_TIERS[save.weaponTier].name+'!',150,'#ffdd44');}else showMsg('Not enough materials or gold!',100,'#ff8888');}
      }
      if(bsmTab===1&&pressed('Enter')){
        const ti=save.armorTier;
        if(ti<ARMOR_TIERS.length-1){const next=ARMOR_TIERS[ti+1];const hasMat=!next.mat||(save.materials[next.mat]||0)>=1;const hasG=save.coins>=next.cost;if(hasMat&&hasG){if(next.mat)save.materials[next.mat]--;save.coins-=next.cost;save.armorTier++;svSave();showMsg('Armor upgraded to '+ARMOR_TIERS[save.armorTier].name+'!',150,'#44aaff');}else showMsg('Not enough materials or gold!',100,'#ff8888');}
      }
      if(bsmTab===2){for(let i=0;i<9;i++){if(pressed('Digit'+(i+1))){save.weaponType=i;svSave();showMsg('Switched to '+WEAPONS[i].name+'!',100,'#aaffff');}}}
    }
    // Shop actions
    if(villTab===3){
      if(pressed('ArrowUp'))villSel=Math.max(0,villSel-1);
      if(pressed('ArrowDown'))villSel=Math.min(7,villSel+1);
      if(pressed('Enter')){
        if(villSel===0&&save.coins>=50&&save.potions<save.maxPotions){save.coins-=50;save.potions++;svSave();showMsg('Bought Potion!',80,'#66ff88');}
        else if(villSel===1&&save.coins>=120&&save.potions<save.maxPotions){save.coins-=120;save.potions++;svSave();P.hp=Math.min(P.maxHP,P.hp+~~(P.maxHP*0.7));showMsg('Used Mega Potion!',80,'#66ff88');}
        else if(villSel===2&&save.coins>=30){save.coins-=30;P.poison=0;svSave();showMsg('Poison cured!',80,'#88ffaa');}
        else if(villSel===3&&save.coins>=300&&save.maxPotions<10){save.coins-=300;save.maxPotions++;svSave();showMsg('Pouch expanded! Max: '+save.maxPotions,100,'#ffdd44');}
        else if(villSel===4&&save.coins>=150){save.coins-=150;svSave();const near=monsters.filter(m=>m.alive&&Math.abs(m.x-P.x)<400);near.forEach(m=>{m.stunT=3;});showMsg('Flash Bomb! Stunned '+near.length+' monsters!',100,'#ffffaa');}
        else if(villSel===5&&save.coins>=200){save.coins-=200;svSave();const nm=monsters.filter(m=>m.alive).sort((a,b)=>Math.abs(a.x-P.x)-Math.abs(b.x-P.x))[0];if(nm){nm.stunT=4;showMsg(nm.name+' trapped! Paralyzed 4s',100,'#aaffaa');}else showMsg('No monsters nearby!',80,'#ff8888');}
        else if(villSel===6&&save.coins>=80){save.coins-=80;svSave();P.hotDrink=(P.hotDrink||0)+60;showMsg('Hot Drink! Blizzard immunity 60s',100,'#ffaaaa');}
        else if(villSel===7&&save.coins>=400){save.coins-=400;save.potions=save.maxPotions;P.hp=P.maxHP;svSave();showMsg('Max Potion! Fully restored!',100,'#66ff66');}
        else showMsg('Not enough gold or already max!',80,'#ff8888');
      }
    }
    // Expedition prep actions
    if(villTab===4){
      for(let i=0;i<9;i++){if(pressed('Digit'+(i+1))&&villTab===4){save.weaponType=i;svSave();}}
      if(pressed('Enter')){gs=ST.WORLD;P.x=950;P.y=GY-P.h;cam.x=0;resetStarterChest();save.weaponType=save.weaponType||0;svSave();showMsg('Equipped: '+WEAPON_TIERS[save.weaponTier].name+' '+WEAPONS[save.weaponType].name+'!  [J]=Attack  [H]=Potion',220,'#ffdd44');}
    }
    dayTime=(dayTime+0.5)%DAY_LEN;
  } else if(gs===ST.DEAD){
    if(pressed('Enter')){P.hp=P.maxHP;P.x=400;P.y=GY-P.h;P.vx=0;P.vy=0;P.burn=P.poison=P.freeze=P.paralyze=P.dragonBlight=P.blastBuildup=0;gs=ST.VILLAGE;villTab=0;cam.x=0;}
  } else if(gs===ST.PAUSE){
    if(pressed('KeyP')||pressed('Escape')){gs=pauseFrom;pauseFrom=ST.VILLAGE;}
  } else {
    if(pressed('KeyP')||pressed('Escape')){pauseFrom=gs;gs=ST.PAUSE;}
    update(dt);
  }
  draw();requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script></body></html>
